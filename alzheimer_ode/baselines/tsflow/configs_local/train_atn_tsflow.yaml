model: conditional
setting: univariate
model_params:
  backbone_params:
    input_dim: 1
    output_dim: 1
    step_emb: 64
    num_residual_blocks: 3
    residual_block: s4
    hidden_dim: 64
    dropout: 0.0
    init_skip: False
    feature_skip: True

  freq: Y
  normalization: null
  context_length: 0
  prediction_length: 4

  use_ema: True
  use_lags: False

  num_steps: 32
  solver: euler
  matching: random

  device: cpu

  optimizer_params:
    lr: 1.e-3

  prior_params:
    kernel: ou
    gamma: 1
    context_freqs: 14

  ema_params:
    beta: 0.9999
    update_after_step: 128
    update_every: 1

  multi_series_univariate: True
  static_feature_dim: 6

dataset_params:
  dataset: atn_custom
  train_path: data/ALL/train
  test_path: data/ALL/test
  json_file: data/TABLE_Destrieux.json
  target_dim: 444
  num_batches_per_epoch: 128
  batch_size: 64

trainer_params:
  gradient_clip_val: .5
  max_epochs: 400
  num_sanity_val_steps: 0

evaluation_params:
  num_samples: 1
  use_validation_set: False
  eval_every: 20
  do_final_eval: True

# seed: 6432
seed: 6430
# seed: 432
